spring:
  application:
    name: refinej
  main:
    log-startup-info: false
    banner-mode: "off"

refinej:
  default-engine: spoon       # spoon | rewrite | javaparser
  indexing:
    incremental: true
    parallel-threads: 8
    ignore-patterns:
      - "**/target/**"
      - "**/build/**"
      - "**/node_modules/**"
      - "**/.refinej/**"
  backup:
    enabled: true
    directory: .refinej/backups
    keep-days: 7

logging:
  level:
    org.alexmond.refinej: INFO
    root: WARN
