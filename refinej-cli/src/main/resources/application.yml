spring:
  application:
    name: refinej
  main:
    log-startup-info: false
    banner-mode: "off"
  datasource:
    url: jdbc:h2:file:./.refinej/index;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 500
  flyway:
    locations: classpath:db/migration

refinej:
  default-engine: spoon       # spoon | rewrite | javaparser
  indexing:
    incremental: true
    parallel-threads: 8
    ignore-patterns:
      - "**/target/**"
      - "**/build/**"
      - "**/node_modules/**"
      - "**/.refinej/**"
  backup:
    enabled: true
    directory: .refinej/backups
    keep-days: 7

logging:
  level:
    org.alexmond.refinej: INFO
    root: WARN
