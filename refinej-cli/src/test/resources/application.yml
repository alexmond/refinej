spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
  main:
    log-startup-info: false
    banner-mode: "off"

refinej:
  default-engine: spoon

logging:
  level:
    root: WARN
