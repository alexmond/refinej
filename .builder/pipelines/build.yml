name: Build & Test

on: [push, manual]
checkout: true
push:
  branches: [main]

jobs:
  build:
    image: eclipse-temurin:21-jdk
    matrix:
      java: ["21"]
    cache:
      key: m2-refinej
      paths: [.m2/repository]
    steps:
      - name: Build (skip tests)
        run: ./mvnw -B clean install -DskipTests -Dmaven.repo.local=.m2/repository
      - name: Run tests
        run: ./mvnw -B verify -Dmaven.repo.local=.m2/repository
    artifacts:
      - "**/target/surefire-reports/"
